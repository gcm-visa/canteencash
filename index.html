<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My App</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>


  <button id="installBtn" style="display:none;">Install App</button>
  <h1>Canteen Cash</h1>
<p>Loading app...</p>
<button onclick="openApp()">Launch</button>
<h2>Open App</h2>
<button onclick="openApp()">Launch</button>

<script>
function openApp() {
  window.location.href = "https://script.google.com/a/macros/gcm.edu.ph/s/AKfycbwTWG64jn7L0VDRlN7s3u8_X3MWxb5H_7l0SvvjZ964A_lAnOblCP58kdy4iL18NejGpA/exec";
}

// Register service worker FIRST
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
  <script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const installBtn = document.getElementById('installBtn');
  installBtn.style.display = 'block';

  installBtn.addEventListener('click', () => {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
    });
  });
});
</script>
</script>

</body>
</html>
