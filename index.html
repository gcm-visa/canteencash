<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canteen Cash</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      text-align: center;
    }
    #installBtn {
      display: none;
      margin-bottom: 15px;
      padding: 12px 20px;
      font-size: 16px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      width: 80%;
      max-width: 400px;
    }
  </style>
</head>
<body>

<h1>Canteen Cash</h1>
<p id="status">Loading app...</p>

<button id="installBtn">Install App</button>

<div class="card" id="app">
  <!-- API content will go here -->
</div>

<script>
  // ✅ 1. Set your API URL here at the very top of your script
  const API_URL = "https://script.google.com/macros/s/AKfycbwTWG64jn7L0VDRlN7s3u8_X3MWxb5H_7l0SvvjZ964A_lAnOblCP58kdy4iL18NejGpA/exec?mode=app";

  // ✅ 2. Fetch data from GAS API
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      document.getElementById("status").style.display = "none";
      document.getElementById("app").innerHTML = `
        <h2>${data.title}</h2>
        <p>${data.message}</p>
      `;
    })
    .catch(() => {
      document.getElementById("status").innerText = "Offline or failed to load data";
    });

  // ✅ 3. Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // ✅ 4. Handle install prompt
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';

    installBtn.addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });
    });
  });
</script>

</body>
</html>
